services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  backend:
    build: ./backend
    ports:
      - "6868:8080"
    environment:
      - PORT=8080
      - TZ=Europe/Warsaw
    networks:
      - backend
      - frontend

  frontend:
    depends_on:
      - backend
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/frontend/src
      - ./frontend/public:/frontend/public
      - ./frontend/index.html:/frontend/index.html
    environment:
      - TZ=Europe/Warsaw
    networks:
      - frontend
    command: npm run dev
volumes:
  postgres_data:

networks:
  backend:
  frontend: